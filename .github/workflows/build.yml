name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate platform folders (android/ios) if missing
        run: |
          if [ ! -d "android" ]; then
            flutter create . --project-name dito_gym_tracker --platforms android,ios
          fi

      - name: Add required Android permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "POST_NOTIFICATIONS" "$MANIFEST"; then
            sed -i '0,/<application/s##<uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <uses-permission android:name="android.permission.VIBRATE"/>\n    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM"/>\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>\n    <uses-permission android:name="android.permission.USE_BIOMETRIC"/>\n\n    <application#' "$MANIFEST"
          fi

      - name: Enable core library desugaring
        run: |
          if [ -f "android/app/build.gradle.kts" ]; then
            FILE="android/app/build.gradle.kts"
            if ! grep -q "esugaringEnabled" "$FILE"; then
              sed -i '/compileOptions {/a\        isCoreLibraryDesugaringEnabled = true' "$FILE"
            fi
            if ! grep -q "desugar_jdk_libs" "$FILE"; then
              cat >> "$FILE" << 'GRADLEEOF'

          dependencies {
              coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")
          }
          GRADLEEOF
            fi
          else
            FILE="android/app/build.gradle"
            if ! grep -q "esugaringEnabled" "$FILE"; then
              sed -i '/compileOptions {/a\        coreLibraryDesugaringEnabled true' "$FILE"
            fi
            if ! grep -q "desugar_jdk_libs" "$FILE"; then
              cat >> "$FILE" << 'GRADLEEOF'

          dependencies {
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
          }
          GRADLEEOF
            fi
          fi

      - name: Bump compileSdk version
        run: |
          if [ -f "android/app/build.gradle.kts" ]; then
            FILE="android/app/build.gradle.kts"
            sed -i -E 's/compileSdk[[:space:]]*=[[:space:]]*flutter\.compileSdkVersion/compileSdk = 36/' "$FILE"
          else
            FILE="android/app/build.gradle"
            sed -i -E 's/compileSdk(Version)?[[:space:]]+flutter\.compileSdkVersion/compileSdkVersion 36/' "$FILE"
          fi

      - name: Enable biometric auth support (FlutterFragmentActivity)
        run: |
          MAINACT_KT=$(find android/app/src/main/kotlin -name MainActivity.kt 2>/dev/null | head -n 1)
          MAINACT_JAVA=$(find android/app/src/main/java -name MainActivity.java 2>/dev/null | head -n 1)
          if [ -n "$MAINACT_KT" ]; then
            sed -i 's/import io.flutter.embedding.android.FlutterActivity/import io.flutter.embedding.android.FlutterFragmentActivity/' "$MAINACT_KT"
            sed -i 's/: FlutterActivity/: FlutterFragmentActivity/' "$MAINACT_KT"
          elif [ -n "$MAINACT_JAVA" ]; then
            sed -i 's/io.flutter.embedding.android.FlutterActivity/io.flutter.embedding.android.FlutterFragmentActivity/' "$MAINACT_JAVA"
            sed -i 's/extends FlutterActivity/extends FlutterFragmentActivity/' "$MAINACT_JAVA"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dito-gym-tracker-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
