name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Generate platform folders (android/ios) if missing
        run: |
          if [ ! -d "android" ]; then
            flutter create . --project-name dito_gym_tracker --platforms android,ios --overwrite=false
          fi

      - name: Add required Android permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "POST_NOTIFICATIONS" "$MANIFEST"; then
            sed -i '0,/<application/s##<uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>\n    <uses-permission android:name="android.permission.VIBRATE"/>\n    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM"/>\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/>\n\n    <application#' "$MANIFEST"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dito-gym-tracker-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
