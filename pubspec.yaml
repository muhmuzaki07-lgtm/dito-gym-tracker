name: dito_gym_tracker
description: "Dito Gym Tracker - Men's Physique Upper/Lower Split Hypertrophy Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Charts
  fl_chart: ^0.68.0

  # Animations
  lottie: ^3.1.2

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  csv: ^6.0.0
  pdf: ^3.11.0
  path: ^1.9.0
  permission_handler: ^11.3.1
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
